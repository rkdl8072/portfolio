<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<link rel="stylesheet" href="portfolio.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── 비밀번호 모달 ── */
  #pw-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  #pw-modal.open { display: flex; }

  .pw-box {
    background: #fff;
    border-radius: 12px;
    padding: 2.2rem 2.4rem 2rem;
    width: 100%;
    max-width: 340px;
    text-align: center;
    animation: fadeIn 0.2s ease;
  }

  .pw-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: #1a1a1a;
    margin-bottom: 0.4rem;
  }

  .pw-sub {
    font-size: 13px;
    color: #888;
    margin-bottom: 1.4rem;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
  }

  .pw-input {
    width: 100%;
    border: 1.5px solid #E5E0D8;
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 20px;
    text-align: center;
    letter-spacing: 0.4em;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .pw-input:focus { border-color: #C4703F; }

  .pw-error {
    font-size: 12px;
    color: #e53e3e;
    margin: 0.6rem 0 0;
    min-height: 18px;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .pw-actions {
    display: flex;
    gap: 0.7rem;
    margin-top: 1.4rem;
    justify-content: center;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
  .pw-box.shake { animation: shake 0.35s ease; }
</style>
</head>
<body>

<!-- ── HERO ── -->
<section id="hero">
  <p class="hero-eyebrow">Artist & Illustrator</p>
  <h1 class="hero-name"><br><em>이가이 입니다</em></h1>
  <p class="hero-desc">
    안녕하세요. <br>
    색과 선으로 이야기를 쓰고, 보는 이에게 작은 여운을 남기고 싶습니다.
  </p>
  <div class="hero-links">
    <a href="#">Instagram</a>
    <a href="#">Behance</a>
    <a href="#">rkdl.8072@gmail.com</a>
  </div>
  <div class="hero-rule" data-text="PORTFOLIO"></div>
  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>
</section>

<!-- ── GALLERY ── -->
<section id="gallery-section">
  <div class="section-header">
    <h2 class="section-title">Works</h2>
    <div style="display:flex;gap:0.7rem;align-items:center;flex-wrap:wrap;">

      <!-- Mode: photo only / with text -->
      <div class="ctrl-group">
        <button class="ctrl-btn active" id="btn-mode-full" onclick="setMode('full')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="4" rx="1"/>
            <rect x="9" y="7" width="6" height="2" rx="0.5"/><rect x="1" y="9" width="14" height="2" rx="0.5"/>
          </svg>
          글과 함께
        </button>
        <button class="ctrl-btn" id="btn-mode-photo" onclick="setMode('photo')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="3" width="6" height="5" rx="1"/><rect x="9" y="3" width="6" height="5" rx="1"/>
            <rect x="1" y="10" width="6" height="3" rx="1"/><rect x="9" y="10" width="6" height="3" rx="1"/>
          </svg>
          사진만
        </button>
      </div>

      <!-- Grid size -->
      <div class="ctrl-group">
        <button class="ctrl-btn" id="btn-size-1" onclick="setGrid(1)" title="크게보기">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="2" width="12" height="12" rx="1.5"/>
          </svg>
        </button>
        <button class="ctrl-btn active" id="btn-size-3" onclick="setGrid(3)" title="보통">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="1" width="4" height="4" rx="0.8"/><rect x="6" y="1" width="4" height="4" rx="0.8"/><rect x="11" y="1" width="4" height="4" rx="0.8"/>
            <rect x="1" y="7" width="4" height="4" rx="0.8"/><rect x="6" y="7" width="4" height="4" rx="0.8"/><rect x="11" y="7" width="4" height="4" rx="0.8"/>
            <rect x="1" y="13" width="4" height="4" rx="0.8"/><rect x="6" y="13" width="4" height="4" rx="0.8"/><rect x="11" y="13" width="4" height="4" rx="0.8"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btn-size-2" onclick="setGrid(2)" title="작게보기">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="1" width="6.5" height="6.5" rx="1"/><rect x="8.5" y="1" width="6.5" height="6.5" rx="1"/>
            <rect x="1" y="8.5" width="6.5" height="6.5" rx="1"/><rect x="8.5" y="8.5" width="6.5" height="6.5" rx="1"/>
          </svg>
        </button>
      </div>

      <!-- Upload (admin only) -->
      <button class="upload-btn" onclick="openUpload()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="8" y1="12" x2="8" y2="4"/><polyline points="4,8 8,4 12,8"/>
          <line x1="2" y1="14" x2="14" y2="14"/>
        </svg>
        업로드
      </button>
    </div>
  </div>

  <div id="gallery-grid" class="layout-grid-3 mode-full">
    <div class="empty-state">
      <div class="empty-icon">🖼</div>
      <p>아직 업로드된 작품이 없습니다.<br>우측 하단 버튼으로 관리자 모드를 켜고 작품을 올려보세요.</p>
    </div>
  </div>
</section>

<!-- ── LIGHTBOX ── -->
<div id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="closeLightbox(null, true)">×</button>
  <div class="lb-inner">
    <div class="lb-img"><img id="lb-img-el" src="" alt=""></div>
    <div class="lb-info">
      <p class="lb-date" id="lb-date"></p>
      <h2 class="lb-title" id="lb-title"></h2>
      <p class="lb-desc" id="lb-desc"></p>
    </div>
  </div>
</div>

<!-- ── UPLOAD MODAL ── -->
<div id="upload-modal" onclick="closeUpload(event)">
  <div class="modal-box">
    <h3>새 작품 올리기</h3>
    <div class="form-group">
      <label>이미지</label>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21,15 16,10 5,21"/>
        </svg>
        <p>클릭하거나 이미지를 드래그하세요</p>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="previewFile(this)">
      <img id="preview-img" alt="미리보기">
    </div>
    <div class="form-group">
      <label>제목</label>
      <input type="text" id="input-title" placeholder="작품 제목">
    </div>
    <div class="form-group">
      <label>설명 (선택)</label>
      <textarea id="input-desc" placeholder="작품에 대한 이야기를 적어주세요..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeUpload(null, true)">취소</button>
      <button class="btn-submit" onclick="submitWork()">올리기</button>
    </div>
  </div>
</div>

<!-- ── PASSWORD MODAL ── -->
<div id="pw-modal" onclick="closePwModal(event)">
  <div class="pw-box" id="pw-box">
    <p class="pw-title">관리자 인증</p>
    <p class="pw-sub">비밀번호를 입력하세요</p>
    <input type="password" id="pw-input" class="pw-input" placeholder="••••" maxlength="20"
      onkeydown="if(event.key==='Enter') confirmPw()">
    <p class="pw-error" id="pw-error"></p>
    <div class="pw-actions">
      <button class="btn-cancel" onclick="closePwModal(null, true)">취소</button>
      <button class="btn-submit" onclick="confirmPw()">확인</button>
    </div>
  </div>
</div>

<!-- Admin toggle -->
<button class="admin-toggle" id="admin-btn" onclick="toggleAdmin()">관리자</button>

<script>
  // ── State ──
  let works = JSON.parse(localStorage.getItem('portfolio-works') || '[]');
  let currentMode = 'full';
  let currentGrid = 3;
  let isAdmin = false;
  let fileData = null;

  // ── Render ──
  function render() {
    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = '';

    if (works.length === 0) {
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🖼</div>
        <p>아직 업로드된 작품이 없습니다.<br>우측 하단 버튼으로 관리자 모드를 켜고 작품을 올려보세요.</p>
      </div>`;
      return;
    }

    works.forEach((w, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-img-wrap" style="position:relative">
          <img src="${w.img}" alt="${w.title}" loading="lazy">
          <button class="card-delete" onclick="deleteWork(event, ${i})">×</button>
        </div>
        <div class="card-body">
          <p class="card-date">${w.date}</p>
          <h3 class="card-title">${w.title}</h3>
          <p class="card-desc">${w.desc || ''}</p>
        </div>`;
      card.querySelector('.card-img-wrap img').addEventListener('click', () => openLightbox(w));
      grid.appendChild(card);

      // stagger animation
      card.style.opacity = '0';
      card.style.transform = 'translateY(16px)';
      setTimeout(() => {
        card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }, i * 60);
    });
  }

  // ── Layout controls ──
  function setMode(mode) {
    currentMode = mode;
    const grid = document.getElementById('gallery-grid');
    grid.classList.remove('mode-full', 'mode-photo');
    grid.classList.add('mode-' + mode);
    document.getElementById('btn-mode-full').classList.toggle('active', mode === 'full');
    document.getElementById('btn-mode-photo').classList.toggle('active', mode === 'photo');
  }

  function setGrid(n) {
    currentGrid = n;
    const grid = document.getElementById('gallery-grid');
    grid.classList.remove('layout-grid-1', 'layout-grid-2', 'layout-grid-3');
    grid.classList.add('layout-grid-' + n);
    [1,2,3].forEach(x => document.getElementById('btn-size-'+x).classList.toggle('active', x === n));
  }

  // ── Lightbox ──
  function openLightbox(w) {
    document.getElementById('lb-img-el').src = w.img;
    document.getElementById('lb-title').textContent = w.title;
    document.getElementById('lb-date').textContent = w.date;
    document.getElementById('lb-desc').textContent = w.desc || '';
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(e, force) {
    if (!force && e && e.target !== document.getElementById('lightbox')) return;
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ── Upload ──
  function openUpload() {
    document.getElementById('upload-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeUpload(e, force) {
    if (!force && e && e.target !== document.getElementById('upload-modal')) return;
    document.getElementById('upload-modal').classList.remove('open');
    document.body.style.overflow = '';
    resetForm();
  }

  function resetForm() {
    fileData = null;
    document.getElementById('file-input').value = '';
    document.getElementById('input-title').value = '';
    document.getElementById('input-desc').value = '';
    document.getElementById('preview-img').style.display = 'none';
  }

  function previewFile(input) {
    if (!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      fileData = e.target.result;
      const img = document.getElementById('preview-img');
      img.src = fileData;
      img.style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }

  function submitWork() {
    const title = document.getElementById('input-title').value.trim();
    if (!fileData) { alert('이미지를 선택해주세요.'); return; }
    if (!title) { alert('제목을 입력해주세요.'); return; }
    const now = new Date();
    const date = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
    works.unshift({ img: fileData, title, desc: document.getElementById('input-desc').value.trim(), date });
    save();
    render();
    closeUpload(null, true);
  }

  function deleteWork(e, i) {
    e.stopPropagation();
    if (!confirm('이 작품을 삭제할까요?')) return;
    works.splice(i, 1);
    save();
    render();
  }

  function save() {
    try { localStorage.setItem('portfolio-works', JSON.stringify(works)); } catch(e) {}
  }

  // ── Admin + Password ──
  const ADMIN_PW = '1234';

  function toggleAdmin() {
    if (isAdmin) {
      // 관리자 → 뷰어 모드: 바로 전환
      isAdmin = false;
      document.body.classList.remove('admin-mode');
      document.getElementById('admin-btn').classList.remove('active');
      document.getElementById('admin-btn').textContent = '관리자';
    } else {
      // 뷰어 → 관리자 모드: 비밀번호 확인
      openPwModal();
    }
  }

  function openPwModal() {
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').textContent = '';
    document.getElementById('pw-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('pw-input').focus(), 120);
  }

  function closePwModal(e, force) {
    if (!force && e && e.target !== document.getElementById('pw-modal')) return;
    document.getElementById('pw-modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function confirmPw() {
    const val = document.getElementById('pw-input').value;
    if (val === ADMIN_PW) {
      isAdmin = true;
      document.body.classList.add('admin-mode');
      document.getElementById('admin-btn').classList.add('active');
      document.getElementById('admin-btn').textContent = '뷰어 모드';
      closePwModal(null, true);
    } else {
      document.getElementById('pw-error').textContent = '비밀번호가 틀렸습니다.';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
      // 흔들기 애니메이션
      const box = document.getElementById('pw-box');
      box.classList.remove('shake');
      void box.offsetWidth;
      box.classList.add('shake');
    }
  }

  // ── Drag & drop ──
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = ev => {
        fileData = ev.target.result;
        const img = document.getElementById('preview-img');
        img.src = fileData;
        img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });

  // ESC close
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeLightbox(null, true);
      closeUpload(null, true);
      closePwModal(null, true);
    }
  });

  // Init
  render();
</script>
</body>
</html>
